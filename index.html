<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <title>Countdown Timer - Simple and Minimalist</title>
  <link rel="icon" type="image" href="media/icon.png">
  
  <meta name="description" content="A simple, distraction-free countdown timer that stays accurate even when the tab is minimized or in the background. Set hours, minutes, and seconds instantly." />
  <meta name="keywords" content="countdown timer, online timer, background timer, accurate countdown, minimalist timer" />
  <meta name="author" content="Countdown Timer App" />
  <link rel="canonical" href="https://hashiratekamosaleoviederanokatema.github.io/SimpleCountdown/" />
  <meta name="robots" content="index, follow" />

  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://hashiratekamosaleoviederanokatema.github.io/SimpleCountdown/" />
  <meta property="og:title" content="Countdown Timer - Precise &amp; Minimalist" />
  <meta property="og:description" content="A simple, distraction-free countdown timer. Stays accurate in the background. Set hours, minutes, and seconds." />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="en_US" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Countdown Timer - Precise &amp; Minimalist" />
  <meta name="twitter:description" content="A simple, distraction-free countdown timer that works accurately in the background." />

  <meta name="theme-color" content="#090b10" />
  <meta name="application-name" content="Countdown Timer" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Countdown" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Countdown Timer",
    "description": "A simple, distraction-free countdown timer that stays accurate in the background.",
    "applicationCategory": "UtilitiesApplication",
    "operatingSystem": "Any",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
    "url": "https://hashiratekamosaleoviederanokatema.github.io/SimpleCountdown/"
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #090b10;
      --surface:      #0f1318;
      --border:       #1e2430;
      --accent:       #e8ff47;
      --accent2:      #47c8ff;
      --text:         #e8ecf4;
      --muted:        #4a5168;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body:    'DM Sans', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: .45;
      pointer-events: none;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: .18;
      pointer-events: none;
      animation: drift 14s ease-in-out infinite alternate;
    }
    .orb-1 { width: 500px; height: 500px; background: var(--accent);  top: -120px; left: -100px; animation-delay: 0s; }
    .orb-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; right: -80px; animation-delay: -7s; }
    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(40px,30px) scale(1.12); }
    }

    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 0;
    }

    .label {
      font-size: .72rem;
      font-weight: 500;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp .6s .2s ease forwards;
    }

    .countdown {
      display: flex;
      align-items: flex-start;
      gap: 0;
      opacity: 0;
      animation: fadeUp .7s .35s ease forwards;
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .digits {
      font-family: var(--font-display);
      font-size: clamp(80px, 15vw, 180px);
      line-height: 1;
      color: var(--text);
      letter-spacing: .01em;
      position: relative;
      transition: color .15s;
      min-width: 2ch;
      text-align: center;
    }

    .digits.tick {
      color: var(--accent);
      text-shadow: 0 0 40px rgba(232,255,71,.5);
    }

    .unit-label {
      font-size: .62rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 6px;
      font-weight: 500;
    }

    .sep {
      font-family: var(--font-display);
      font-size: clamp(60px, 11vw, 140px);
      line-height: 1;
      color: var(--muted);
      padding: 0 4px;
      margin-top: -4px;
      opacity: .35;
      user-select: none;
    }

    .progress-wrap {
      width: min(520px, 80vw);
      margin-top: 40px;
      opacity: 0;
      animation: fadeUp .7s .5s ease forwards;
    }

    .progress-track {
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      overflow: visible;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 2px;
      transform-origin: left center;
      transition: transform .5s ease;
      position: relative;
      width: 100%;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      right: -1px;
      top: 50%;
      transform: translateY(-50%);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-top: 36px;
      opacity: 0;
      animation: fadeUp .7s .65s ease forwards;
    }

    .ctrl-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font-body);
      font-size: .68rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      padding: 9px 20px;
      border-radius: 40px;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .ctrl-btn:hover        { border-color: var(--accent2); color: var(--accent2); }
    .ctrl-btn.active       { border-color: var(--accent);  color: var(--accent);  }
    .ctrl-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    .kbd-hint {
      margin-top: 18px;
      font-size: .6rem;
      letter-spacing: .12em;
      color: var(--muted);
      opacity: 0;
      animation: fadeUp .7s .8s ease forwards;
    }
    .kbd-hint kbd {
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: var(--font-body);
      font-size: .58rem;
    }

    .finished-msg {
      display: none;
      font-family: var(--font-display);
      font-size: clamp(40px, 8vw, 90px);
      letter-spacing: .06em;
      color: var(--accent);
      text-shadow: 0 0 60px rgba(232,255,71,.4);
      text-align: center;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .finished-msg.show { display: block; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .5; } }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(9,11,16,.85);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 48px;
      width: min(480px, 90vw);
      transform: translateY(20px);
      transition: transform .3s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal h2 {
      font-family: var(--font-display);
      font-size: 2rem;
      letter-spacing: .06em;
      margin-bottom: 8px;
      color: var(--text);
    }

    .modal p {
      font-size: .78rem;
      color: var(--muted);
      margin-bottom: 32px;
      letter-spacing: .04em;
    }

    .input-row {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }

    .input-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-group label {
      font-size: .62rem;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }

    .input-group input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-display);
      font-size: 2.2rem;
      letter-spacing: .04em;
      text-align: center;
      width: 100%;
      padding: 12px 8px;
      border-radius: 10px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-group input::-webkit-outer-spin-button,
    .input-group input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .input-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232,255,71,.1);
    }
    .input-group input:invalid { border-color: #ff4747; }

    .modal-footer {
      display: flex;
      gap: 12px;
    }

    .btn {
      flex: 1;
      padding: 14px;
      border-radius: 10px;
      font-family: var(--font-body);
      font-size: .8rem;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      transition: all .2s;
    }
    .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

    .btn-primary  { background: var(--accent); color: #090b10; }
    .btn-primary:hover { background: #f0ff6a; transform: translateY(-1px); }

    .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .btn-secondary:hover { border-color: var(--muted); color: var(--text); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="orb orb-1" aria-hidden="true"></div>
  <div class="orb orb-2" aria-hidden="true"></div>

  <main class="app" role="main">
    <p class="label" id="label" aria-live="polite">Time remaining</p>

    <div
      class="countdown"
      id="countdown"
      role="timer"
      aria-live="off"
      aria-label="Countdown timer"
    >
      <div class="unit">
        <span class="digits" id="dHours" aria-label="hours">00</span>
        <span class="unit-label" aria-hidden="true">Hours</span>
      </div>
      <span class="sep" aria-hidden="true">:</span>
      <div class="unit">
        <span class="digits" id="dMins" aria-label="minutes">00</span>
        <span class="unit-label" aria-hidden="true">Minutes</span>
      </div>
      <span class="sep" aria-hidden="true">:</span>
      <div class="unit">
        <span class="digits" id="dSecs" aria-label="seconds">00</span>
        <span class="unit-label" aria-hidden="true">Seconds</span>
      </div>
    </div>

    <div
      class="finished-msg"
      id="finishedMsg"
      role="alert"
      aria-live="assertive"
    >Time's Up!</div>

    <div class="progress-wrap" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="100" id="progressBar">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="controls" role="group" aria-label="Timer controls">
      <button
        class="ctrl-btn active"
        id="startStopBtn"
        onclick="toggleTimer()"
        aria-pressed="true"
        aria-label="Pause timer"
      >Pause</button>
      <button
        class="ctrl-btn"
        onclick="resetTimer()"
        aria-label="Reset timer"
      >Reset</button>
      <button
        class="ctrl-btn"
        onclick="openModal()"
        aria-label="Set countdown time"
        aria-haspopup="dialog"
      >Set Time</button>
    </div>

    <p class="kbd-hint" aria-label="Keyboard shortcut">
      Press <kbd>Space</kbd> to pause / resume
    </p>
  </main>

  <div
    class="modal-overlay"
    id="modalOverlay"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modalTitle"
    aria-describedby="modalDesc"
  >
    <div class="modal">
      <h2 id="modalTitle">Set Countdown</h2>
      <p id="modalDesc">Enter the duration below to start counting down.</p>
      <div class="input-row">
        <div class="input-group">
          <label for="inputHours">Hours</label>
          <input
            type="number"
            id="inputHours"
            value="0"
            min="0"
            max="99"
            inputmode="numeric"
            autocomplete="off"
          />
        </div>
        <div class="input-group">
          <label for="inputMins">Minutes</label>
          <input
            type="number"
            id="inputMins"
            value="5"
            min="0"
            max="59"
            inputmode="numeric"
            autocomplete="off"
          />
        </div>
        <div class="input-group">
          <label for="inputSecs">Seconds</label>
          <input
            type="number"
            id="inputSecs"
            value="0"
            min="0"
            max="59"
            inputmode="numeric"
            autocomplete="off"
          />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()" aria-label="Cancel">Cancel</button>
        <button class="btn btn-primary"   onclick="applyTime()"  aria-label="Apply time and start">Start</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'countdownState';

    let totalMs   = 5 * 60 * 1000;
    let endTime   = null;
    let remaining = totalMs;
    let running   = false;
    let rafId     = null;
    let bgInterval = null;
    let lastSec   = -1;

    const dHours       = document.getElementById('dHours');
    const dMins        = document.getElementById('dMins');
    const dSecs        = document.getElementById('dSecs');
    const progressFill = document.getElementById('progressFill');
    const progressBar  = document.getElementById('progressBar');
    const finishedMsg  = document.getElementById('finishedMsg');
    const countdown    = document.getElementById('countdown');
    const startStopBtn = document.getElementById('startStopBtn');
    const labelEl      = document.getElementById('label');

    function pad(n) { return String(n).padStart(2, '0'); }

    function render(ms)
    {
      const totalSec = Math.max(0, Math.ceil(ms / 1000));
      if (totalSec === lastSec) return;
      lastSec = totalSec;

      const h = Math.floor(totalSec / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;

      dHours.textContent = pad(h);
      dMins.textContent  = pad(m);
      dSecs.textContent  = pad(s);

      const pct = totalMs > 0 ? Math.max(0, Math.min(1, ms / totalMs)) : 0;
      progressFill.style.transform = `scaleX(${pct})`;
      progressBar.setAttribute('aria-valuenow', Math.round(pct * 100));

      document.title = totalSec > 0
        ? `${pad(h)}:${pad(m)}:${pad(s)}`
        : "Time's Up!";

      dSecs.classList.add('tick');
      clearTimeout(dSecs._tickTimer);
      dSecs._tickTimer = setTimeout(() => dSecs.classList.remove('tick'), 200);
    }

    function startBgInterval()
    {
      clearInterval(bgInterval);
      bgInterval = setInterval(() => {
        if (!running) { clearInterval(bgInterval); return; }
        const ms = endTime - Date.now();
        if (ms <= 0) { clearInterval(bgInterval); finish(); return; }
        const totalSec = Math.max(0, Math.ceil(ms / 1000));
        const h = Math.floor(totalSec / 3600);
        const mVal = Math.floor((totalSec % 3600) / 60);
        const s = totalSec % 60;
        document.title = `${pad(h)}:${pad(mVal)}:${pad(s)}`;
      }, 500);
    }

    function stopBgInterval()
    {
      clearInterval(bgInterval);
      bgInterval = null;
    }

    function loop()
    {
      if (!running) return;

      const now = Date.now();
      const ms  = endTime - now;

      if (ms <= 0) { finish(); return; }

      render(ms);
      rafId = requestAnimationFrame(loop);
    }

    function finish()
    {
      running = false;
      cancelAnimationFrame(rafId);
      stopBgInterval();
      remaining = 0;
      render(0);
      countdown.style.display  = 'none';
      finishedMsg.classList.add('show');
      labelEl.textContent      = '— done —';
      document.title           = "Time's Up!";
      setStartStopState(false, 'Start');

      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          totalMs,
          remaining: totalMs,
          endTime:   null,
          savedAt:   Date.now(),
          finished:  true
        }));
      } catch (_) {}
    }

    function toggleTimer()
    {
      if (remaining <= 0 && !running) return;

      if (running)
      {
        cancelAnimationFrame(rafId);
        stopBgInterval();
        running   = false;
        remaining = Math.max(0, endTime - Date.now());
        setStartStopState(false, 'Resume');
      }
      else
      {
        endTime = Date.now() + remaining;
        running = true;
        setStartStopState(true, 'Pause');
        rafId = requestAnimationFrame(loop);
        startBgInterval();
      }
      saveState();
    }

    function resetTimer()
    {
      cancelAnimationFrame(rafId);
      stopBgInterval();
      running   = false;
      remaining = totalMs;
      endTime   = null;
      lastSec   = -1;

      countdown.style.display = 'flex';
      finishedMsg.classList.remove('show');
      labelEl.textContent = 'Time remaining';
      setStartStopState(false, 'Start');
      render(remaining);
      saveState();
    }

    function setStartStopState(isRunning, label)
    {
      startStopBtn.textContent = label;
      startStopBtn.setAttribute('aria-label', `${label} timer`);
      startStopBtn.setAttribute('aria-pressed', String(isRunning));
      startStopBtn.classList.toggle('active', isRunning);
    }

    function openModal()
    {
      const overlay = document.getElementById('modalOverlay');
      overlay.classList.add('open');
      document.getElementById('inputHours').focus();
    }

    function closeModal()
    {
      document.getElementById('modalOverlay').classList.remove('open');
    }

    function applyTime()
    {
      const h = Math.max(0, parseInt(document.getElementById('inputHours').value) || 0);
      const m = Math.max(0, Math.min(59, parseInt(document.getElementById('inputMins').value) || 0));
      const s = Math.max(0, Math.min(59, parseInt(document.getElementById('inputSecs').value) || 0));

      const newMs = (h * 3600 + m * 60 + s) * 1000;
      if (newMs <= 0) { document.getElementById('inputSecs').focus(); return; }

      cancelAnimationFrame(rafId);
      stopBgInterval();

      totalMs   = newMs;
      remaining = newMs;
      endTime   = null;
      lastSec   = -1;
      running   = false;

      countdown.style.display = 'flex';
      finishedMsg.classList.remove('show');
      labelEl.textContent = 'Time remaining';
      render(remaining);
      closeModal();

      endTime = Date.now() + remaining;
      running = true;
      setStartStopState(true, 'Pause');
      rafId = requestAnimationFrame(loop);
      startBgInterval();
      saveState();
    }

    document.addEventListener('visibilitychange', () =>
    {
      if (document.visibilityState === 'visible' && running)
      {
        cancelAnimationFrame(rafId);
        lastSec = -1;
        rafId = requestAnimationFrame(loop);
      }
    });

    document.addEventListener('keydown', (e) =>
    {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
      if (e.code === 'Space') { e.preventDefault(); toggleTimer(); }
      if (e.code === 'Escape') closeModal();
    });

    document.getElementById('modalOverlay').addEventListener('click', function(e)
    {
      if (e.target === this) closeModal();
    });

    ['inputMins','inputSecs'].forEach(id =>
    {
      document.getElementById(id).addEventListener('blur', function() {
        const val = parseInt(this.value);
        if (!isNaN(val)) this.value = Math.max(0, Math.min(59, val));
      });
    });

    function saveState()
    {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          totalMs,
          remaining: running ? Math.max(0, endTime - Date.now()) : remaining,
          endTime:   running ? endTime : null,
          savedAt:   Date.now()
        }));
      } catch (_) {}
    }

    function loadState()
    {
      try
      {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return false;
        const s = JSON.parse(raw);
        if (!s || typeof s.totalMs !== 'number') return false;

        totalMs = s.totalMs;

        if (s.finished) {
          remaining = totalMs;
          return false;
        }

        if (s.endTime)
        {
          const leftMs = s.endTime - Date.now();
          if (leftMs > 0) { remaining = leftMs; return true; }
          remaining = totalMs;
          return false;
        }

        remaining = typeof s.remaining === 'number' ? s.remaining : totalMs;
        return false;
      } catch (_) {
        return false;
      }
    }

    (function init()
    {
      const shouldAutoStart = loadState();
      lastSec = -1;
      render(remaining);

      if (shouldAutoStart && remaining > 0)
      {
        endTime = Date.now() + remaining;
        running = true;
        setStartStopState(true, 'Pause');
        rafId = requestAnimationFrame(loop);
        startBgInterval();
      }
      else
      {
        setStartStopState(false, 'Start');
      }
    })();
  </script>
</body>
</html>
